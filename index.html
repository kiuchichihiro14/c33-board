<!DOCTYPE html>
<html>
<head>
  <title>chihiro簡易掲示板</title>
  <meta charset="utf-8">

  <style>
    body {
      background: #333333;
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .main {
      width: 100%;
      padding: 0 10px;
      box-sizing: border-box;
      max-width: none;
    }

    header, footer, .toukou, .coment {
      background: #444444;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    header {
      background: linear-gradient(135deg, #444455, #333399);
      color: white;
      text-align: center;
    }

    h1, h2, h3, h4, h5 {
      margin: 8px 0;
      color: #eeeeee;
    }

    #messages {
      list-style: none;
      color: #eeeeee;
      padding: 0;
      margin: 0;
    }

    #messages li {
      background: #444444;
      margin: 4px 0;
      padding: 8px;
      border-radius: 8px;
    }

    input, textarea {
      width: 100%;
      color: #000000;
      padding: 12px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 80px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #4a90e2;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }

    .sabisii { color: #999; }

    .blue { color: blue; }
    .red { color: red; }
    .yellow { color: gold; }
    .green { color: green; }
    .orange { color: orange; }
  </style>
</head>

<body>
<div class="main">

  <h2>c33簡易掲示板 Ver.2.0</h2>
  <h4 id="userCount">現在の参加者数: 0人</h4>
  <h2>卒業まで : <span id="countdown"></span></h2>

  <header>
    <h1>インターネット掲示板へようこそ!</h1>
  </header>

  <h5>自由に投稿できます</h5>
  <h5 class="sabisii">最近投稿が少なくて寂しい…</h5>

  <div class="coment">
    <ul id="messages"></ul>
  </div>

  <button onclick="toggleOldMessages()">過去の投稿を表示 / 非表示</button>

  <h3>投稿フォーム</h3>

  <div class="toukou">
    <input id="name" placeholder="名前（15文字以内）">
    <textarea id="msg" placeholder="メッセージ"></textarea>
    <button onclick="sendMessage()">投稿</button>
  </div>

  <footer>
    <h5>chihiro ga tukuri masita.</h5>
  </footer>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "chihirokeizibann.firebaseapp.com",
  projectId: "chihirokeizibann"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const msgRef = db.collection("messages");

let showOldMessages = false;
let oldMessagesCache = [];
let currentNewMessages = [];

/* 表示切替 */
function toggleOldMessages() {
  showOldMessages = !showOldMessages;
  renderMessages(currentNewMessages, oldMessagesCache);
}

/* ★ここだけ修正（独自記号復活） */
function formatText(text) {
  text = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  text = text
    .replace(/&lt;ft&gt;(.*?)&lt;\/ft&gt;/g, "<strong>$1</strong>")
    .replace(/&lt;b&gt;(.*?)&lt;\/b&gt;/g, "<span class='blue'>$1</span>")
    .replace(/&lt;r&gt;(.*?)&lt;\/r&gt;/g, "<span class='red'>$1</span>")
    .replace(/&lt;y&gt;(.*?)&lt;\/y&gt;/g, "<span class='yellow'>$1</span>")
    .replace(/&lt;g&gt;(.*?)&lt;\/g&gt;/g, "<span class='green'>$1</span>")
    .replace(/&lt;o&gt;(.*?)&lt;\/o&gt;/g, "<span class='orange'>$1</span>");

  return text;
}

/* 表示 */
function renderMessages(newMessages, oldMessages) {
  const list = document.getElementById("messages");
  list.innerHTML = "";

  function createMessageElement(text) {
    const li = document.createElement("li");

    const match = text.match(/^(.*?): (.*) \((.*)\)$/);

    if (match) {
      const name = formatText(match[1]);
      const message = formatText(match[2]);
      const time = match[3];

      li.innerHTML = `${name} : ${message} ${time}`;
    }

    return li;
  }

  const allMessages = showOldMessages
    ? [...oldMessages, ...newMessages]
    : newMessages.slice(-20);

  allMessages.forEach(t => {
    list.appendChild(createMessageElement(t));
  });
}

/* Firestore */
msgRef.orderBy("time", "desc").onSnapshot(snapshot => {
  const newMessages = [];

  snapshot.docs.forEach(doc => {
    const data = doc.data();
    const now = new Date();

    if (!data.time) return;
    
    const postedTime = data.time?.toDate();

    let timeText = "不明";

    if (postedTime) {
      const diffSec = Math.floor((now - postedTime) / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHour = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHour / 24);

      if (diffSec < 60) timeText = `${diffSec}秒前`;
      else if (diffMin < 60) timeText = `${diffMin}分前`;
      else if (diffHour < 24) timeText = `${diffHour}時間前`;
      else timeText = `${diffDay}日前`;
    }

    newMessages.unshift(`${data.name}: ${data.message} (${timeText})`);
  });

  currentNewMessages = newMessages;
  renderMessages(currentNewMessages, oldMessagesCache);
});

/* 投稿 */
function sendMessage() {
  const name = document.getElementById("name").value.trim();
  const msg = document.getElementById("msg").value.trim();

  if (!name || !msg) return;

  msgRef.add({
    name,
    message: msg,
    time: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("msg").value = "";
}

/* Enter送信 */
document.getElementById("msg").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

/* カウントダウン */
const graduationDate = new Date("2029-03-01T10:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = graduationDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").textContent = "卒業おめでとう！";
    return;
  }

  const sec = Math.floor(diff / 1000);
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  const m = Math.floor((sec % 3600) / 60);

  document.getElementById("countdown").textContent =
    `${d}日 ${h}時間 ${m}分`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

</script>

</body>
</html>
